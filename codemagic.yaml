scripts:
  - &get_google_services_plist
    name: "Get Google Services configuration"
    script: |
      echo $GOOGLE_SERVICES_PLIST | base64 --decode > $CM_BUILD_DIR/MoppApp/GoogleService-Info.plist

workflows:
  debug:
    name: RIA DigiDoc (MOPP2)
    max_build_duration: 120
    instance_type: mac_mini_m2
    #integrations:
     # app_store_connect: RIA DigiDoc (MOPP)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ee.ria.digidoc
      groups:
        - "google_services"
      vars:
        BUNDLE_ID: "ee.ria.digidoc"
        XCODE_SCHEME: "MoppApp"
        APP_STORE_APPLE_ID: ET847QJV9F
      xcode: latest
    scripts:
      - *get_google_services_plist
      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          pwd
          cd $CM_BUILD_DIR/MoppApp
          pwd
          ls
          #LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          #agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
          
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build ipa for distribution
        script: |
          pwd
          ls $CM_BUILD_DIR/MoppApp
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/MoppApp/MoppApp.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - marten.rebane@nortal.com
        notify:
          success: true
          failure: true
      #app_store_connect:
        #auth: integration

        # Configuration related to TestFlight (optional)
        # Note: This action is performed during post-processing.
        #submit_to_testflight: true

        # Configuration related to App Store (optional)
        # Note: This action is performed during post-processing.
        #submit_to_app_store: false
